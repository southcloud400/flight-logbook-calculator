<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Flight Logbook Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="app-header">
        <h2>Flight Logbook Calculator</h2>
    </header>

    <div class="image-input-row">

        <div class="image-input-group">

            <label for="left-image-input">
                左ページ
            </label>

            <input
                type="file"
                id="left-image-input"
                accept="image/*">

            <img
                id="left-image-preview"
                class="small-image-preview"
                alt="左ページ画像">
        </div>

        <div class="image-input-group">

            <label for="right-image-input">
                右ページ
            </label>

            <input
                type="file"
                id="right-image-input"
                accept="image/*">

            <img
                id="right-image-preview"
                class="small-image-preview"
                alt="右ページ画像">
        </div>

    </div>

    <button id="read-button" type="button">
        Read Logbook
    </button>

    <section id="result-area">
        <h3>Flight Time</h3>

        <p id="result-message">
            読み取り結果はここに表示されます。
        </p>

        <div id="flight-time-table-area">
            <table id="flight-time-table">
                <thead>
                    <tr>
                        <th>Row</th>
                        <th>Flight Time</th>
                        <th>PUS</th>
                    </tr>
                </thead>

                <tbody id="flight-time-table-body">
                </tbody>

                <tfoot>
                    <tr class="total-row">
                        <th>Total</th>

                        <td>
                            <strong id="flight-time-total-value">
                                0:00
                            </strong>
                        </td>

                        <td>
                            <strong id="pus-total-value">
                                0:00
                            </strong>
                        </td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </section>


    <script src="main.js"></script>

</body>

</html>
