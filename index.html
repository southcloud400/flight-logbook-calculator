<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Flight Logbook Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="app-header">
        <h2>Flight Logbook Calculator</h2>
    </header>

    <input
        type="file"
        id="image-input"
        accept="image/*">

    <p id="selected-file-name">画像が選択されていません</p>

    <button id="read-button" type="button">
        Read Flight Time
    </button>

    <section id="result-area">
        <h3>Flight Time</h3>

        <p id="result-message">
            読み取り結果はここに表示されます。
        </p>

        <div id="flight-time-table-area">
            <table id="flight-time-table">
                <thead>
                    <tr>
                        <th>Row</th>
                        <th>Flight Time</th>
                        <th>PUS</th>
                    </tr>
                </thead>

                <tbody id="flight-time-table-body">
                </tbody>

                <tfoot>
                    <tr class="total-row">
                        <th>Total</th>

                        <td>
                            <strong id="flight-time-total-value">
                                0:00
                            </strong>
                        </td>

                        <td>
                            <strong id="pus-total-value">
                                0:00
                            </strong>
                        </td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </section>

    <div id="image-preview-area">
        <img id="image-preview" alt="選択したログブック画像">
    </div>

    <script src="main.js"></script>

</body>

</html>
